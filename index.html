<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>건삼이의 작업공간</title>
  <meta name="description" content="건삼이의 개인 작업공간 메인 페이지">
  <!-- SUIT Variable 폰트 불러오기 -->
  <link href="https://cdn.jsdelivr.net/gh/sun-typeface/SUIT@2/fonts/variable/woff2/SUIT-Variable.css" rel="stylesheet">
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="stylesheet" href="style.css">
  <style>
    /* SEO용 스크린 리더 전용 스타일 (시각적으로 숨김) */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <!-- SEO를 위한 h1 구조 (시각적으로는 숨김) -->
  <h1 id="main-title" class="sr-only">건삼이의 작업공간</h1>

  <div class="container">
    <img src="image.png" alt="건삼이의 작업공간 이미지" id="workspace-image" class="main-image">
  </div>
</body>
</html>
